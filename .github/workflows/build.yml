name: Build desktop clients

# Click "Run workflow" in the Actions tab (or it runs on a v* tag). GitHub builds the
# Mac / Windows / Linux clients on its own cloud machines and publishes them to a Release.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.1)"
        required: true
        default: "0.1.1"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: "--mac --arm64"
          - os: windows-latest
            target: "--win --x64"
          - os: ubuntu-latest
            target: "--linux --x64"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Build (${{ matrix.os }})
        run: npx electron-builder ${{ matrix.target }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"   # unsigned mac build (no keychain)
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            electron/dist/*.dmg
            electron/dist/*.exe
            electron/dist/*.AppImage
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "Silly Farmers ${{ github.event.inputs.version }}"
          files: dist/*
          fail_on_unmatched_files: false
